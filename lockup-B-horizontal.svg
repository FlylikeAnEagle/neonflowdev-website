<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <radialGradient id="ground-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="line-fade" gradientUnits="userSpaceOnUse" x1="100" y1="95" x2="100" y2="380">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="line-fade-inner" gradientUnits="userSpaceOnUse" x1="100" y1="95" x2="100" y2="380">
      <stop offset="0%" stop-color="#e0fff9" stop-opacity="1"/>
      <stop offset="70%" stop-color="#e0fff9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0fff9" stop-opacity="0"/>
    </linearGradient>

    <path id="logo-hexes" d="
      M 100 40 L 160 70 L 160 120 L 100 150 L 40 120 L 40 70 Z
      M 40 140 L 100 170 L 160 140 L 160 190 L 100 220 L 40 190 Z
      M 40 210 L 100 240 L 160 210 L 160 260 L 100 290 L 40 260 Z
    " />
    <path id="logo-center-line" d="M 100 95 L 100 380" />
  </defs>

  <g transform="translate(30, -5) scale(0.5)">
    <ellipse cx="100" cy="300" rx="80" ry="20" fill="url(#ground-glow)" />

    <g filter="url(#neon-glow)" fill="none">
      <use href="#logo-hexes" stroke="#00E5FF" stroke-width="7" stroke-linejoin="miter" stroke-miterlimit="4"/>
      <use href="#logo-center-line" stroke="url(#line-fade)" stroke-width="7" stroke-linecap="round"/>
    </g>

    <g fill="none">
      <use href="#logo-hexes" stroke="#e0fff9" stroke-width="2.5" stroke-linejoin="miter" stroke-miterlimit="4"/>
      <use href="#logo-center-line" stroke="url(#line-fade-inner)" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <text x="160" y="115" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="95" fill="#00E5FF" filter="url(#text-glow)">NEON FLOW</text>
  
  <text x="160" y="115" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="95" fill="#e0fff9">NEON FLOW</text>
  
  <text x="165" y="165" font-family="'Segoe UI', Arial, sans-serif" font-weight="500" font-size="38" fill="#808080" letter-spacing="0.5em">DEV</text>
</svg>
